name: "Deep Project Investigation & Auto-Repair"

on:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 6 AM UTC
  workflow_dispatch:

env:
  PHP_VERSION: '8.4'

jobs:
  deep-maintenance:
    name: 🤖 Autonomous Architect Cycle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup Environment & Dependencies
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Initialize App & Database
        run: |
          composer config platform.php ${{ env.PHP_VERSION }}
          composer update --no-progress --ignore-platform-req=php
          touch database/database.sqlite
          php artisan migrate:fresh --force
        shell: bash

      - name: Initialize Gemini CLI
        run: |
          npm install -g @google/gemini-cli
          mkdir -p ~/.gemini
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > ~/.gemini/.env
        shell: bash

      - name: 1. Deep Investigation
        run: |
          mkdir -p Document/investigations/$(date +%Y-%m-%d)
          # Try 3.1 Flash first, fallback to 2.5 Pro
          gemini -y -m gemini-3.1-flash -p "Scan the full project. Identify technical debt, missing infrastructure, or logic errors. Generate a strict TODO checklist in Document/investigations/$(date +%Y-%m-%d)/analysis.md" || \
          gemini -y -m gemini-2.5-pro -p "Senior Architect: Scan project for tech debt. Create TODO in Document/investigations/$(date +%Y-%m-%d)/analysis.md"
        shell: bash

      - name: 2. Autonomous Repair
        run: |
          # The agent dynamically reads its own analysis and executes it
          REPAIR_PROMPT="
            ACT AS AN AUTONOMOUS DEVELOPER.
            Read Document/investigations/$(date +%Y-%m-%d)/analysis.md.
            
            TASKS:
            1. Execute the items on the TODO checklist.
            2. Overwrite files using the 'write_file' tool for precision.
            3. Log all actual changes made in Document/investigations/$(date +%Y-%m-%d)/execution_log.md."

          gemini -y -m gemini-3.1-flash -p "$REPAIR_PROMPT" || \
          gemini -y -m gemini-2.5-pro -p "$REPAIR_PROMPT"
        shell: bash

      - name: 3. Verify & Self-Correct
        run: |
          composer dump-autoload
          
          # Capture output to pass to Gemini if it fails
          if ! vendor/bin/phpunit --colors=never > phpunit_output.txt 2>&1; then
            echo "Tests failed. Triggering Self-Correction loop..."
            gemini -y -m gemini-2.5-pro -p "Tests failed. Here is the exact PHPUnit output: $(cat phpunit_output.txt). Use 'write_file' to correct these specific errors immediately."
          else
            echo "All tests passed successfully."
          fi
        shell: bash

      - name: 4. PR & Finalize
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "Gemini Architect"
          git config user.email "gemini-bot@google.com"
          
          # Check if there are actually any changes before committing
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH_NAME="ai/maintenance-$(date +%Y-%m-%d)"
            git checkout -b $BRANCH_NAME
            git add .
            git commit -m "docs & autonomous repair: daily maintenance cycle"
            git push origin $BRANCH_NAME
            
            # Create and merge using admin bypass
            PR_URL=$(gh pr create --title "🤖 Maintenance & Repair: $(date +%Y-%m-%d)" --body "Deep investigation report and automated repairs applied." --base main --head $BRANCH_NAME)
            gh pr merge $PR_URL --admin --squash --delete-branch
          else
            echo "No changes detected by AI. Skipping PR creation."
          fi
        shell: bash
