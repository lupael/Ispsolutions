name: "Autonomous Laravel Agent"

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  APP_ENV: ci
  PHP_VERSION: '8.4'

jobs:
  analyze-and-trigger:
    name: 🔍 Analyze & Trigger Gemini
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Using PAT here ensures the checkout has the right identity
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, bcmath, curl, intl, sqlite3, zip, gd
          tools: composer:v2

      - name: Fix Composer & Run Diagnostics
        id: diagnostics
        run: |
          composer config platform.php 8.4.0
          composer update --no-progress --prefer-dist --no-interaction
          
          mkdir -p tmp/diagnostics
          # Run tools and ensure output is saved to files
          vendor/bin/phpstan analyse --no-progress > tmp/diagnostics/phpstan.txt 2>&1 || echo "HAS_ERRORS=true" >> $GITHUB_ENV
          vendor/bin/phpunit --colors=never > tmp/diagnostics/phpunit.txt 2>&1 || echo "HAS_ERRORS=true" >> $GITHUB_ENV
        shell: bash

      - name: Create Fix PR
        if: env.HAS_ERRORS == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "fix: include diagnostic logs for AI review"
          branch: "ai/fix-attempt-${{ github.run_id }}"
          title: "🛠 AI Fix Requested: CI Failures Detected"
          # This ensures the .txt files are part of the PR so Gemini can read them
          add-paths: |
            tmp/diagnostics/*.txt
          body: |
            ## 🚨 CI Failure Detected
            @gemini-code-assist please review the attached diagnostics.
          labels: autofix

      - name: Trigger Gemini Bot
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          # GH_TOKEN must be the PAT so the comment comes from a "human"
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          # The slash command works best when coming from a human identity
          gh pr comment $PR_NUMBER --body "/gemini review errors in tmp/diagnostics/ and suggest fixes"
