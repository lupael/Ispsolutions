name: "Autonomous Laravel Agent (Full Auto)"

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.4'

jobs:
  analyze-and-fix:
    name: 🤖 Fix & Auto-Merge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Run Diagnostics
        id: diagnostics
        run: |
          composer config platform.php 8.4.0
          composer update --no-progress --ignore-platform-reqs
          mkdir -p tmp/diagnostics
          
          # Run analysis and capture output
          vendor/bin/phpstan analyse --no-progress > tmp/diagnostics/phpstan_full.txt 2>&1 || echo "HAS_ERRORS=true" >> $GITHUB_ENV
          vendor/bin/phpunit --colors=never > tmp/diagnostics/phpunit_full.txt 2>&1 || echo "HAS_ERRORS=true" >> $GITHUB_ENV
          
          # Truncate to first 50 lines to save quota tokens
          [ -s tmp/diagnostics/phpstan_full.txt ] && head -n 50 tmp/diagnostics/phpstan_full.txt > tmp/diagnostics/phpstan.txt
          [ -s tmp/diagnostics/phpunit_full.txt ] && head -n 50 tmp/diagnostics/phpunit_full.txt > tmp/diagnostics/phpunit.txt
        shell: bash

      - name: Apply AI Fixes
        if: env.HAS_ERRORS == 'true'
        run: |
          npm install -g @google/gemini-cli
          
          # Setup Auth
          mkdir -p ~/.gemini
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > ~/.gemini/.env
          
          # Use -m gemini-3.1-flash-lite-preview for maximum quota and speed
          # -y for YOLO/Auto-approval
          gemini -y -m gemini-3.1-flash-lite-preview -p "Fix the PHP 8.4 errors summarized in the first 50 lines of tmp/diagnostics/phpstan.txt and phpunit.txt. Edit the source files directly."
        shell: bash

      - name: Create & Auto-Merge PR
        if: env.HAS_ERRORS == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "fix: autonomous AI repair (Flash-Lite)"
          branch: "ai/fix-applied-${{ github.run_id }}"
          title: "🤖 Autonomous Fix Applied (Flash-Lite)"
          body: "Generated by Gemini 3.1 Flash-Lite. Auto-merging on CI success."

      - name: Enable Auto-Merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr review ${{ steps.cpr.outputs.pull-request-number }} --approve
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash
