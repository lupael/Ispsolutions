name: "Autonomous Laravel Agent (Fix & Verify)"

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.4'

jobs:
  analyze-fix-verify:
    name: 🤖 Autonomous Repair Cycle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, bcmath, curl, intl, sqlite3, zip, gd
          tools: composer:v2

      - name: Initial Diagnostics
        id: diagnostics
        run: |
          composer config platform.php 8.4.0
          # We ignore platform reqs here to ensure we can at least run the analysis
          composer update --no-progress --ignore-platform-req=php
          mkdir -p tmp/diagnostics
          vendor/bin/phpstan analyse --no-progress 2>&1 | head -n 50 > tmp/diagnostics/phpstan.txt || echo "HAS_ERRORS=true" >> $GITHUB_ENV
          vendor/bin/phpunit --colors=never 2>&1 | head -n 50 > tmp/diagnostics/phpunit.txt || echo "HAS_ERRORS=true" >> $GITHUB_ENV
        shell: bash

      - name: Apply AI Fixes
        if: env.HAS_ERRORS == 'true'
        run: |
          npm install -g @google/gemini-cli
          mkdir -p ~/.gemini
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > ~/.gemini/.env
          # YOLO mode with Flash-Lite for cost/quota efficiency
          gemini -y -m gemini-3.1-flash-lite-preview -p "
            Analyze the PHP 8.4 errors in tmp/diagnostics/. 
            Overwrite source files using 'write_file' to fix these issues. 
            Ensure the code remains compatible with Laravel standards."
        shell: bash

      - name: Verify AI Fix (Post-Repair CI)
        if: env.HAS_ERRORS == 'true'
        run: |
          echo "🔍 Verifying AI fixes with a fresh test run..."
          # If this fails, the workflow stops and no PR is merged
          vendor/bin/phpunit --colors=never
        shell: bash

      - name: Create Fix PR
        if: env.HAS_ERRORS == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "fix: autonomous AI repair (verified)"
          branch: "ai/fix-applied-${{ github.run_id }}"
          title: "🤖 Autonomous Fix Applied & Verified"
          body: "Gemini 3.1 Flash-Lite fixed the errors. Tests passed after the fix. Merging via admin."

      - name: Enable Auto-Merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Immediate admin merge because we verified the fix in the previous step
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --admin --squash --delete-branch
