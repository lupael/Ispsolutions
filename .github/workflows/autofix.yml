name: "Autonomous Laravel Agent"

permissions:
  contents: write
  pull-requests: write
  issues: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  APP_ENV: ci
  PHP_VERSION: '8.4' # Aligned with ispsolution's latest requirements

jobs:
  analyze-and-trigger:
    name: 🔍 Analyze & Trigger Gemini
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, bcmath, curl, intl, sqlite3, zip, gd
          coverage: none
          tools: composer:v2

      - name: Fix Composer Platform & Sync
        run: |
          # Force the platform to 8.4 to satisfy zipstream-php 3.x
          composer config platform.php 8.4.0
          
          # Remove the old lock file and re-install to clear the 8.2/8.3 "Trap"
          # This is necessary because your project depends on phpspreadsheet/zipstream
          composer update --no-progress --prefer-dist --no-interaction
        shell: bash

      - name: Run Diagnostics
        id: diagnostics
        run: |
          mkdir -p tmp/diagnostics
          # 1. Static Analysis
          vendor/bin/phpstan analyse --no-progress > tmp/diagnostics/phpstan.txt 2>&1 || echo "HAS_ERRORS=true" >> $GITHUB_ENV
          # 2. Styling
          vendor/bin/pint --test || echo "HAS_ERRORS=true" >> $GITHUB_ENV
          # 3. Tests
          vendor/bin/phpunit --colors=never > tmp/diagnostics/phpunit.txt 2>&1 || echo "HAS_ERRORS=true" >> $GITHUB_ENV
        shell: bash

      - name: Create Fix PR
        if: env.HAS_ERRORS == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: automated diagnostic report for Gemini"
          branch: "ai/fix-attempt-${{ github.run_id }}"
          title: "🛠 AI Fix Requested: CI Failures Detected"
          body: |
            ## 🚨 CI Failure Detected in ispsolution
            @gemini-code-assist please review the diagnostics in `tmp/diagnostics/`.
            
            **Focus Areas:**
            1. Resolve PHP 8.4 compatibility issues.
            2. Fix any failures in `phpunit.txt`.
          labels: autofix, automated

      - name: Trigger Gemini Bot
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr comment $PR_NUMBER --body "/gemini review errors and fix dependencies for PHP 8.4"
