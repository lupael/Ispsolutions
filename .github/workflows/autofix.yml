name: "Autonomous Laravel Agent (Full Auto)"

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.4'

jobs:
  analyze-and-fix:
    name: 🤖 Fix & Auto-Merge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Run Diagnostics
        id: diagnostics
        run: |
          composer config platform.php 8.4.0
          composer update --no-progress --ignore-platform-reqs
          mkdir -p tmp/diagnostics
          
          # Capture only the first 50 lines to save your Gemini API quota
          vendor/bin/phpstan analyse --no-progress 2>&1 | head -n 50 > tmp/diagnostics/phpstan.txt || echo "HAS_ERRORS=true" >> $GITHUB_ENV
          vendor/bin/phpunit --colors=never 2>&1 | head -n 50 > tmp/diagnostics/phpunit.txt || echo "HAS_ERRORS=true" >> $GITHUB_ENV
        shell: bash

      - name: Apply AI Fixes
        if: env.HAS_ERRORS == 'true'
        run: |
          npm install -g @google/gemini-cli
          mkdir -p ~/.gemini
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > ~/.gemini/.env
          
          # Using Flash-Lite for higher quota and -y for YOLO mode
          gemini -y -m gemini-3.1-flash-lite-preview -p "Fix the PHP 8.4 errors found in tmp/diagnostics/ by editing the source files in this workspace."
        shell: bash

      - name: Create Fix PR
        if: env.HAS_ERRORS == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "fix: autonomous AI repair for PHP 8.4"
          branch: "ai/fix-applied-${{ github.run_id }}"
          title: "🤖 Autonomous Fix Applied"
          body: "This PR was generated and applied by the Gemini CLI Agent. Auto-merging using admin bypass."

      - name: Enable Auto-Merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Use --admin to bypass the 'Self-Approval' restriction
          # Use --auto to wait for any other required status checks (like Pint/Tests)
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash --admin --delete-branch
