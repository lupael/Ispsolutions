name: "Autonomous Laravel Agent (Full Auto)"

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.4'

jobs:
  analyze-and-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Run Diagnostics
        id: diag
        run: |
          composer config platform.php 8.4.0
          composer update --no-progress --ignore-platform-reqs
          mkdir -p tmp/diagnostics
          vendor/bin/phpstan analyse --no-progress > tmp/diagnostics/phpstan.txt 2>&1 || echo "HAS_ERRORS=true" >> $GITHUB_ENV
        shell: bash

      - name: Apply AI Fixes
        if: env.HAS_ERRORS == 'true'
        run: |
          npm install -g @google/gemini-cli
          # -y is the ONLY flag needed for auto-approval in 2026
          # -p triggers the headless/non-interactive mode
          gemini -y -p "Fix PHP 8.4 errors in tmp/diagnostics/ for the files in this repo."
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Create & Auto-Merge PR
        if: env.HAS_ERRORS == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "fix: automated AI repair"
          branch: "ai/fix-${{ github.run_id }}"
          title: "🤖 Autonomous Fix Applied"
          body: "Applied by Gemini Agent. Auto-merging on success."

      - name: Enable Auto-Merge
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr review --approve "$(gh pr list --limit 1 --json number -q '.[0].number')" || true
          gh pr merge --auto --squash "$(gh pr list --limit 1 --json number -q '.[0].number')"
