name: "Autonomous Laravel Agent"

permissions:
  contents: write
  pull-requests: write
  issues: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  APP_ENV: ci
  PHP_VERSION: '8.3' # Updated to match your package requirements

jobs:
  analyze-and-trigger:
    name: 🔍 Analyze & Trigger Gemini
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, bcmath, curl, intl, sqlite3, zip
          coverage: none
          tools: composer:v2

      - name: Fix Composer Platform & Update
        run: |
          # 1. Remove any hardcoded 8.2 platform requirement from composer.json
          composer config platform.php ${{ env.PHP_VERSION }}
          
          # 2. Perform a non-interactive update to align the lock file with the runner
          # This solves the zipstream-php 3.2.1 / PHP 8.3 requirement mismatch
          composer update --no-progress --prefer-dist --no-interaction
        shell: bash

      - name: Run Diagnostics
        id: diagnostics
        run: |
          mkdir -p tmp/diagnostics
          # 1. Static Analysis (PHPStan)
          vendor/bin/phpstan analyse --no-progress > tmp/diagnostics/phpstan.txt 2>&1 || echo "HAS_ERRORS=true" >> $GITHUB_ENV
          
          # 2. Styling (Pint)
          vendor/bin/pint --test || echo "HAS_ERRORS=true" >> $GITHUB_ENV
          
          # 3. Tests (PHPUnit)
          vendor/bin/phpunit --colors=never > tmp/diagnostics/phpunit.txt 2>&1 || echo "HAS_ERRORS=true" >> $GITHUB_ENV
          
          # 4. Logs
          [ -f storage/logs/laravel.log ] && tail -n 100 storage/logs/laravel.log > tmp/diagnostics/laravel.log
        shell: bash

      - name: Create Fix PR
        if: env.HAS_ERRORS == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: automated diagnostic report for Gemini"
          branch: "ai/fix-attempt-${{ github.run_id }}"
          delete-branch: true
          title: "🛠 AI Fix Requested: CI Failures Detected"
          body: |
            ## 🚨 CI Failure Detected
            @gemini-code-assist please review the failures in the `tmp/diagnostics/` folder.
            
            **Action Required:**
            1. Analyze `phpunit.txt` and `phpstan.txt`.
            2. Verify the PHP 8.3 alignment in `composer.json`.
            3. Suggest code fixes as inline comments.
          labels: autofix, automated

      - name: Trigger Gemini Bot
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr comment $PR_NUMBER --body "/gemini review and fix the errors found in the diagnostics folder, specifically ensuring all dependencies are compatible with PHP 8.3"
